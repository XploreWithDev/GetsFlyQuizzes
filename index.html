<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkillPort · Living Digital Identity</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --accent: #00ff41; 
            --bg: #050505;
            --page-bg: #0a0a0a;
            --border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --glow: rgba(0, 255, 65, 0.4);
        }

        /* THEME & ACCENT SYSTEM */
        body.acc-green { --accent: #00ff41; --glow: rgba(0, 255, 65, 0.5); }
        body.acc-blue { --accent: #00d2ff; --glow: rgba(0, 210, 255, 0.5); }
        body.acc-gold { --accent: #d4af37; --glow: rgba(212, 175, 55, 0.5); }
        body.acc-purple { --accent: #a855f7; --glow: rgba(168, 85, 247, 0.5); }
        body.acc-rose { --accent: #fb7185; --glow: rgba(251, 113, 133, 0.5); }

        /* ENVIRONMENT STYLES */
        body.theme-space { background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #020205 100%); --page-bg: #0c0c14; }
        
        /* Fixed Professional Theme Visibility */
        body.theme-pro { 
            background: #f1f5f9; 
            --text: #0f172a; 
            --page-bg: #ffffff; 
            --border: #e2e8f0; 
            color: #0f172a;
        }
        body.theme-pro .accent-text { filter: brightness(0.8); }
        body.theme-pro .page-container { color: #0f172a; border: 1px solid #e2e8f0; }
        body.theme-pro h1, body.theme-pro h2, body.theme-pro p, body.theme-pro span:not(.accent-text) { color: #0f172a !important; }

        body.theme-cyber { background: #000; --page-bg: #050505; --border: var(--accent); }
        body.theme-doodle { font-family: 'Kalam', cursive; background: #fffceb; --text: #1a1a1a; --page-bg: #ffffff; --border: #1a1a1a; color: #1a1a1a; }
        body.theme-doodle .page-container { color: #1a1a1a; }

        /* BRIGHT MODE OVERRIDE (For non-light themes) */
        body.light-mode:not(.theme-pro):not(.theme-doodle) {
            --bg: #f8fafc;
            --page-bg: #ffffff;
            --text: #0f172a;
            --border: rgba(15, 23, 42, 0.1);
            color: #0f172a;
        }

        * { -webkit-tap-highlight-color: transparent !important; outline: none !important; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            transition: all 0.5s ease;
            touch-action: none;
        }

        .passport-frame {
            perspective: 2500px;
            width: 100%;
            height: 100dvh;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .passport-frame.closed { transform: rotateY(-180deg) scale(0.85); }

        .page-container {
            width: 100%;
            height: 100%;
            background: var(--page-bg);
            position: absolute;
            top: 0; left: 0;
            display: none;
            overflow-y: auto;
            backface-visibility: hidden;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .page-container.active { display: block; z-index: 10; animation: pageTurn 0.6s forwards; }

        @keyframes pageTurn {
            0% { transform: rotateY(15deg) translateX(30px); opacity: 0; }
            100% { transform: rotateY(0deg) translateX(0); opacity: 1; }
        }

        .nav-arrow {
            position: fixed; top: 50%; transform: translateY(-50%);
            width: 40px; height: 40px; background: rgba(0,0,0,0.8);
            border: 1px solid var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 999; color: var(--accent); backdrop-filter: blur(10px);
            box-shadow: 0 0 10px var(--glow); transition: 0.3s;
            font-size: 14px;
        }
        .nav-arrow:hover { transform: translateY(-50%) scale(1.1); box-shadow: 0 0 20px var(--accent); }
        .nav-arrow.left { left: 15px; }
        .nav-arrow.right { right: 15px; }

        /* EXIT PREVIEW BUTTON */
        #exit-preview {
            display: none; position: fixed; top: 20px; left: 20px; z-index: 6000;
            background: var(--accent); color: #000; padding: 10px 20px; border-radius: 12px;
            font-weight: 800; text-transform: uppercase; font-size: 10px; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        body.preview-mode #exit-preview { display: block; }

        .drawer {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100%;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(30px);
            border-left: 1px solid var(--border); z-index: 5000;
            transition: right 0.4s ease; padding: 50px 24px;
        }
        .drawer.active { right: 0; }

        .action-popup {
            position: fixed; bottom: 80px; right: 16px;
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 16px;
            padding: 8px; z-index: 4000; display: none; flex-direction: column;
        }
        .action-popup.active { display: flex; }

        .rect-btn {
            padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.05); font-size: 10px; font-weight: 700;
            text-transform: uppercase; transition: 0.2s; color: #fff; text-align: left;
        }
        .rect-btn:hover { border-color: var(--accent); background: rgba(255,255,255,0.1); }

        .accent-text { color: var(--accent) !important; }
        .accent-bg { background-color: var(--accent) !important; }
        
        .edit-ui { display: block; }
        body.preview-mode .edit-ui { display: none !important; }

        #loading-overlay {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .back-cover {
            width: 100%; height: 100%; background: #050505;
            position: absolute; top: 0; left: 0; transform: rotateY(180deg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backface-visibility: hidden; z-index: 5; border: 4px solid var(--accent);
        }

        /* TEXT EDITING LOGIC - CORRECTED CONTRAST */
        [contenteditable="true"] { 
            transition: color 0.3s ease, background 0.3s ease;
        }
        [contenteditable="true"]:focus { 
            background: rgba(128,128,128,0.15); 
            color: #64748b !important; /* Greyish color on focus for dark themes */
            padding: 0 4px; 
            border-radius: 4px; 
        }
        body.theme-pro [contenteditable="true"]:focus,
        body.light-mode [contenteditable="true"]:focus {
            color: #475569 !important; /* Darker slate for light themes */
        }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--accent); color: #000; padding: 12px 30px; border-radius: 50px;
            font-weight: 800; font-size: 10px; text-transform: uppercase; z-index: 7000;
            transition: 0.4s; pointer-events: none;
        }
        #toast.visible { transform: translateX(-50%) translateY(0); }

        .interaction-hint {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            font-size: 9px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 2px; opacity: 0.3; pointer-events: none;
            z-index: 20; animation: hintPulse 3s infinite;
        }
        @keyframes hintPulse { 0%, 100% { opacity: 0.1; transform: translateX(-50%) scale(1); } 50% { opacity: 0.4; transform: translateX(-50%) scale(1.05); } }

        @media (min-width: 1025px) {
            .mobile-only { display: none !important; }
            .desktop-only { display: flex !important; }
        }
        @media (max-width: 1024px) {
            .desktop-only { display: none !important; }
            .mobile-only { display: flex !important; }
        }

        .pdf-export-mode #user-img { filter: none !important; grayscale: 0 !important; }
    </style>
</head>
<body class="theme-space acc-green" id="swipe-body">

    <div id="loading-overlay">
        <div class="brand text-3xl font-bold tracking-[0.5em] mb-4 text-white">SKILLPORT</div>
        <div class="w-24 h-0.5 bg-white/10 relative overflow-hidden"><div class="absolute inset-0 accent-bg w-1/2 animate-[loading_1s_infinite_linear]"></div></div>
    </div>
    <style> @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } } </style>

    <div id="toast">Identity Synchronized</div>

    <div class="interaction-hint mobile-only">
        <i class="fas fa-arrows-left-right mr-2"></i> Swipe or Tap to Turn
    </div>

    <!-- PERSISTENT OVERLAYS -->
    <button id="exit-preview" onclick="setMode('edit')"><i class="fas fa-edit mr-2"></i> Leave Preview</button>

    <!-- PC HEADER -->
    <nav class="desktop-only fixed top-0 w-full z-[3000] px-10 py-6 flex justify-between items-center bg-black/40 backdrop-blur-xl border-b border-white/5">
        <div class="brand text-2xl font-bold tracking-tighter text-white">SKILLPORT<span class="accent-text">.</span></div>
        <div class="flex items-center gap-6">
            <div class="flex gap-3 items-center text-white">
                <button onclick="setTheme('space')" class="opacity-40 hover:opacity-100 transition-opacity" title="Space"><i class="fas fa-user-astronaut"></i></button>
                <button onclick="setTheme('pro')" class="opacity-40 hover:opacity-100 transition-opacity" title="Professional"><i class="fas fa-briefcase"></i></button>
                <button onclick="setTheme('cyber')" class="opacity-40 hover:opacity-100 transition-opacity" title="Cyber"><i class="fas fa-bolt"></i></button>
                <div class="w-px h-4 bg-white/10 mx-2"></div>
                <button onclick="setAccent('green')" class="w-4 h-4 rounded-full bg-[#00ff41] border border-white/20 hover:scale-125 transition-all"></button>
                <button onclick="setAccent('blue')" class="w-4 h-4 rounded-full bg-[#00d2ff] border border-white/20 hover:scale-125 transition-all"></button>
                <button onclick="setAccent('gold')" class="w-4 h-4 rounded-full bg-[#d4af37] border border-white/20 hover:scale-125 transition-all"></button>
                <div class="w-px h-4 bg-white/10 mx-2"></div>
                <button onclick="toggleLuminance()" class="opacity-40 hover:opacity-100 transition-opacity"><i class="fas fa-circle-half-stroke"></i></button>
            </div>
            <div class="flex bg-white/5 p-1 rounded-xl border border-white/10">
                <button onclick="setMode('edit')" id="pc-btn-edit" class="px-6 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all bg-white/10 text-white">Build</button>
                <button onclick="setMode('preview')" id="pc-btn-preview" class="px-6 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all text-white">Live</button>
            </div>
        </div>
    </nav>

    <!-- MOBILE MENU TRIGGERS -->
    <button onclick="toggleDrawer()" class="mobile-only fixed top-5 right-5 z-[5001] w-12 h-12 bg-black border border-white/10 rounded-full flex items-center justify-center text-white">
        <i class="fas fa-bars" id="menu-icon"></i>
    </button>

    <button onclick="toggleActionMenu()" class="mobile-only fixed bottom-5 right-5 z-[4001] w-12 h-12 bg-black border border-white/10 rounded-full flex items-center justify-center text-white">
        <i class="fas fa-ellipsis-v"></i>
    </button>

    <!-- DRAWER -->
    <div class="drawer" id="side-drawer">
        <h3 class="text-[10px] font-bold uppercase tracking-[0.4em] opacity-30 text-white mb-10">Config</h3>
        <div class="space-y-10">
            <div>
                <label class="text-[9px] font-bold uppercase mb-4 block accent-text tracking-widest">Protocol Mode</label>
                <div class="flex bg-white/5 p-1 rounded-xl border border-white/5">
                    <button onclick="setMode('edit')" id="m-btn-edit" class="flex-1 py-2 rounded-lg text-[10px] font-bold uppercase transition-all bg-white/10 text-white">Build</button>
                    <button onclick="setMode('preview')" id="m-btn-preview" class="flex-1 py-2 rounded-lg text-[10px] font-bold uppercase transition-all text-white">Live</button>
                </div>
            </div>
            <div>
                <label class="text-[9px] font-bold uppercase mb-4 block opacity-40 tracking-widest text-white">Visual Environments</label>
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="setTheme('space')" class="h-10 rounded-xl bg-indigo-900/30 border border-white/10 flex items-center justify-center text-white"><i class="fas fa-user-astronaut text-xs"></i></button>
                    <button onclick="setTheme('pro')" class="h-10 rounded-xl bg-white border border-zinc-200 flex items-center justify-center text-black"><i class="fas fa-briefcase text-xs"></i></button>
                    <button onclick="setTheme('doodle')" class="h-10 rounded-xl bg-[#fffceb] border border-zinc-400 flex items-center justify-center text-black"><i class="fas fa-pen-nib text-xs"></i></button>
                    <button onclick="setTheme('cyber')" class="h-10 rounded-xl bg-black border border-green-500 flex items-center justify-center text-green-500"><i class="fas fa-bolt text-xs"></i></button>
                </div>
            </div>
            <div>
                <label class="text-[9px] font-bold uppercase mb-4 block opacity-40 tracking-widest text-white">Lighting Toggle</label>
                <button onclick="toggleLuminance()" class="w-full py-4 bg-white/5 rounded-xl border border-white/10 text-white text-[10px] font-bold uppercase tracking-widest">
                    <i class="fas fa-circle-half-stroke mr-2"></i> Dark / Bright
                </button>
            </div>
            <div>
                <label class="text-[9px] font-bold uppercase mb-4 block opacity-40 tracking-widest text-white">Core Accents</label>
                <div class="flex flex-wrap gap-4">
                    <button onclick="setAccent('green')" class="w-8 h-8 rounded-full bg-[#00ff41] border-2 border-white/20"></button>
                    <button onclick="setAccent('blue')" class="w-8 h-8 rounded-full bg-[#00d2ff] border-2 border-white/20"></button>
                    <button onclick="setAccent('gold')" class="w-8 h-8 rounded-full bg-[#d4af37] border-2 border-white/20"></button>
                    <button onclick="setAccent('purple')" class="w-8 h-8 rounded-full bg-[#a855f7] border-2 border-white/20"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- ACTION MENU -->
    <div class="action-popup" id="action-popup">
        <button onclick="syncLocal()" class="rect-btn mb-1 flex items-center gap-3"><i class="fas fa-sync-alt accent-text"></i> Synchronize</button>
        <button onclick="exportDossier()" class="rect-btn mb-1 flex items-center gap-3"><i class="fas fa-file-pdf text-blue-400"></i> Generate Dossier</button>
        <button onclick="showQR()" class="rect-btn flex items-center gap-3"><i class="fas fa-qrcode text-purple-400"></i> Broadcast Hub</button>
    </div>

    <!-- NAV ARROWS -->
    <button class="nav-arrow left" onclick="prevPage()"><i class="fas fa-chevron-left"></i></button>
    <button class="nav-arrow right" onclick="nextPage()"><i class="fas fa-chevron-right"></i></button>

    <!-- PASSPORT -->
    <main class="passport-frame" id="main-frame">
        <!-- PAGE 1: IDENTITY -->
        <section id="page-profile" class="page-container active">
            <div class="grid grid-cols-1 lg:grid-cols-2 h-full">
                <div class="p-10 flex flex-col items-center justify-center border-b lg:border-b-0 lg:border-r border-white/5">
                    <div class="relative w-64 h-72 lg:w-72 lg:h-80 mb-10">
                        <img id="user-img" src="https://images.unsplash.com/photo-1633332755192-727a05c4013d?auto=format&fit=crop&q=80&w=400" 
                             class="w-full h-full object-cover rounded-3xl border border-white/10 grayscale" alt="Identity">
                        <div class="absolute -bottom-4 -right-4 w-16 h-16 bg-black border border-white/10 rounded-full flex items-center justify-center edit-ui cursor-pointer shadow-2xl" onclick="document.getElementById('avatar-input').click()">
                            <i class="fas fa-camera text-sm accent-text"></i>
                        </div>
                        <input type="file" id="avatar-input" class="hidden" onchange="handleImage(event)">
                    </div>
                    <div class="flex items-center gap-4 bg-white/5 px-8 py-3.5 rounded-full border border-white/10">
                        <div class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#00ff41]"></div>
                        <span class="text-[11px] font-bold tracking-[0.4em] uppercase" contenteditable="true" id="user-status">ACTIVE</span>
                    </div>
                </div>
                <div class="p-10 lg:p-20 flex flex-col justify-center">
                    <p class="accent-text text-[10px] font-bold tracking-[0.7em] uppercase mb-4">Identity Passport</p>
                    <h1 class="text-5xl lg:text-7xl font-bold tracking-tighter mb-4" contenteditable="true" id="user-name">[NAME]</h1>
                    <p class="text-xl lg:text-3xl opacity-40 font-light mb-10" contenteditable="true" id="user-role">[ROLE]</p>
                    <div class="p-8 bg-white/[0.02] border border-white/5 rounded-[32px] mb-10">
                        <p class="text-base leading-relaxed italic opacity-60 font-light" contenteditable="true" id="user-about">[Professional narrative...]</p>
                    </div>
                    <div class="grid grid-cols-2 gap-10">
                        <div><label class="text-[9px] uppercase font-bold opacity-20 block mb-2">Zone</label><span class="text-sm font-bold" contenteditable="true" id="user-loc">[CITY]</span></div>
                        <div><label class="text-[9px] uppercase font-bold opacity-20 block mb-2">Protocol</label><span class="text-sm font-bold" contenteditable="true" id="user-lang">[LANGS]</span></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- PAGE 2: SKILLS -->
        <section id="page-ecosystem" class="page-container">
            <div class="p-10 lg:p-20 h-full flex flex-col">
                <div class="flex justify-between items-center mb-16">
                    <h2 class="text-4xl lg:text-6xl font-bold tracking-tighter uppercase">Skill Set</h2>
                    <button onclick="addSkill()" class="edit-ui px-8 py-3 border accent-border accent-text rounded-full text-[10px] font-bold uppercase tracking-widest">+ Node</button>
                </div>
                <div id="skill-nodes" class="flex-1 flex flex-wrap gap-6 items-center justify-center content-center overflow-y-auto"></div>
            </div>
        </section>

        <!-- PAGE 3: EXP -->
        <section id="page-path" class="page-container">
            <div class="p-10 lg:p-20 h-full flex flex-col">
                <div class="flex justify-between items-center mb-16">
                    <h2 class="text-4xl lg:text-6xl font-bold tracking-tighter uppercase">Experiences</h2>
                    <button onclick="addExperience()" class="edit-ui accent-text text-[10px] font-bold uppercase tracking-widest">+ Log</button>
                </div>
                <div id="path-timeline" class="space-y-12 flex-1"></div>
            </div>
        </section>

        <!-- PAGE 4: PROJECTS -->
        <section id="page-proof" class="page-container">
            <div class="p-10 lg:p-20 h-full flex flex-col">
                <div class="flex justify-between items-center mb-16">
                    <h2 class="text-4xl lg:text-6xl font-bold tracking-tighter uppercase">Projects</h2>
                    <button onclick="addAsset()" class="edit-ui px-8 py-3 bg-white/5 border border-white/10 rounded-full text-[10px] uppercase tracking-widest">+ Asset</button>
                </div>
                <div id="asset-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>

        <!-- PAGE 5: OUTRO -->
        <section id="page-outro" class="page-container">
            <div class="h-full flex flex-col p-10 lg:p-20">
                <div class="mb-14">
                    <p class="text-[10px] font-bold opacity-30 uppercase tracking-[0.5em] mb-10">Milestones</p>
                    <div class="flex flex-wrap items-center justify-between gap-6">
                        <div id="milestone-container" class="flex flex-wrap gap-12 items-center"></div>
                        <button onclick="addMilestone()" class="edit-ui text-[10px] font-bold accent-text uppercase">+ Add</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 flex-1">
                    <div>
                        <p class="text-[10px] font-bold opacity-30 uppercase tracking-[0.5em] mb-10">Portfolio</p>
                        <div id="portfolio-list" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
                        <button onclick="addPortfolio()" class="edit-ui mt-8 text-[10px] font-bold text-blue-400 uppercase tracking-widest">+ Item</button>
                    </div>
                    <div>

                        <div class="mt-16 p-10 border-2 border-dashed border-white/5 rounded-[40px] text-center">
                            <button onclick="closeIdentity()" class="w-full py-5 bg-white text-black font-bold uppercase text-[11px] tracking-widest">Close Passport</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- BACK COVER -->
        <div class="back-cover" id="back-cover" onclick="reopenIdentity()">
            <div class="flex flex-col items-center p-10 text-center">
                <i class="fas fa-fingerprint text-8xl lg:text-9xl accent-text mb-10 animate-pulse"></i>
                <div class="brand text-5xl lg:text-8xl font-bold tracking-[0.5em] mb-4 text-white">SKILLPORT</div>
                <p class="text-3xl font-bold uppercase tracking-[0.4em] opacity-40 text-white">Thanks.</p>
                <p class="text-[10px] mt-24 opacity-20 uppercase tracking-[0.6em] text-white">Click cover to reopen system</p>
            </div>
        </div>
    </main>

    <!-- PC FOOTER -->
    <footer class="desktop-only fixed bottom-0 w-full z-[3000] px-12 py-6 flex justify-center bg-black/40 backdrop-blur-xl border-t border-white/5">
        <div class="flex items-center gap-12 text-white">
            <button onclick="syncLocal()" class="text-[11px] font-bold uppercase tracking-[0.4em] opacity-50 hover:opacity-100 hover:accent-text transition-all flex items-center gap-3"><i class="fas fa-sync-alt"></i> Synchronize</button>
            <button onclick="exportDossier()" class="text-[11px] font-bold uppercase tracking-[0.4em] opacity-50 hover:opacity-100 hover:text-blue-400 transition-all flex items-center gap-3"><i class="fas fa-file-pdf"></i> Generate Dossier</button>
            <button onclick="showQR()" class="text-[11px] font-bold uppercase tracking-[0.4em] opacity-50 hover:opacity-100 hover:text-purple-400 transition-all flex items-center gap-3"><i class="fas fa-qrcode"></i> Broadcast Hub</button>
        </div>
    </footer>

    <!-- MODAL -->
    <div id="modal-overlay" class="fixed inset-0 z-[9999] bg-black/98 backdrop-blur-3xl hidden items-center justify-center p-6 opacity-0 transition-all duration-300">
        <div class="bg-[#0c0c0c] border border-white/10 p-10 lg:p-14 rounded-[40px] max-w-xl w-full shadow-2xl overflow-y-auto max-h-[90dvh]" onclick="event.stopPropagation()">
            <h3 id="modal-title" class="text-2xl font-bold uppercase tracking-widest accent-text mb-12">Update Node</h3>
            <div id="modal-fields" class="space-y-6 text-white"></div>
            <div class="flex gap-4 mt-14 pt-10 border-t border-white/5">
                <button onclick="saveModalData()" class="flex-1 accent-bg text-black py-4 rounded-2xl font-bold uppercase text-[11px] tracking-widest hover:scale-105 transition-all">Synchronize State</button>
                <button onclick="deleteItem()" class="px-8 py-4 bg-red-500/10 text-red-500 rounded-2xl hover:bg-red-500 transition-all"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    </div>

    <script>
        const pages = ['profile', 'ecosystem', 'path', 'proof', 'outro'];
        let currentPageIndex = 0;
        let state = {
            mode: 'edit', theme: 'space', accent: 'green', lightMode: false,
            skills: [], experience: [], assets: [], milestones: [], portfolio: [], socials: [],
            user: {
                name: '[YOUR NAME]', role: '[YOUR ROLE]', status: 'ACTIVE', about: '[Professional story...]',
                loc: '[CITY]', lang: '[LANGS]', avatar: 'https://images.unsplash.com/photo-1633332755192-727a05c4013d?auto=format&fit=crop&q=80&w=400'
            }
        };

        let touchstartX = 0;
        let touchendX = 0;

        window.onload = () => {
            loadState(); refreshUI(); showPage(pages[currentPageIndex]);
            initSwipe();
            setTimeout(() => { document.getElementById('loading-overlay').style.opacity = '0'; setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500); }, 1200);
        };

        function initSwipe() {
            const body = document.getElementById('swipe-body');
            body.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX, false);
            body.addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; handleSwipe(); }, false);
        }

        function handleSwipe() {
            const threshold = 50;
            if (touchendX < touchstartX - threshold) nextPage();
            if (touchendX > touchstartX + threshold) prevPage();
        }

        function toggleDrawer() { 
            const d = document.getElementById('side-drawer');
            d.classList.toggle('active');
            document.getElementById('menu-icon').className = d.classList.contains('active') ? 'fas fa-times' : 'fas fa-bars';
        }

        function toggleActionMenu() { document.getElementById('action-popup').classList.toggle('active'); }

        function showPage(id) {
            currentPageIndex = pages.indexOf(id);
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(`page-${id}`);
            if(target) target.classList.add('active');
        }

        function nextPage() { currentPageIndex = (currentPageIndex + 1) % pages.length; showPage(pages[currentPageIndex]); }
        function prevPage() { currentPageIndex = (currentPageIndex - 1 + pages.length) % pages.length; showPage(pages[currentPageIndex]); }

        function setTheme(t) { state.theme = t; applyFullTheme(); saveState(); }
        function setAccent(a) { state.accent = a; applyFullTheme(); saveState(); }
        function toggleLuminance() { state.lightMode = !state.lightMode; applyFullTheme(); saveState(); }

        function applyFullTheme() { 
            document.body.className = `theme-${state.theme} acc-${state.accent} ${state.mode === 'preview' ? 'preview-mode' : ''} ${state.lightMode ? 'light-mode' : ''}`; 
        }

        function setMode(m) {
            state.mode = m;
            document.body.classList.toggle('preview-mode', m === 'preview');
            ['m-btn-edit', 'm-btn-preview', 'pc-btn-edit', 'pc-btn-preview'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.classList.toggle('bg-white/10', (id.includes('edit') && m === 'edit') || (id.includes('preview') && m === 'preview'));
            });
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = (m === 'edit'));
            document.getElementById('side-drawer').classList.remove('active');
            saveState();
        }

        function refreshUI() {
            renderSkills(); renderExperience(); renderAssets(); renderOutro();
            document.getElementById('user-name').innerText = state.user.name;
            document.getElementById('user-role').innerText = state.user.role;
            document.getElementById('user-about').innerText = state.user.about;
            document.getElementById('user-status').innerText = state.user.status;
            document.getElementById('user-loc').innerText = state.user.loc;
            document.getElementById('user-lang').innerText = state.user.lang;
            document.getElementById('user-img').src = state.user.avatar;
        }

        function renderSkills() {
            document.getElementById('skill-nodes').innerHTML = state.skills.map((s, i) => `<div onclick="openModal('skills', ${i})" class="bg-white/5 border border-white/10 rounded-3xl p-8 min-w-[160px] text-center cursor-pointer hover:border-accent transition-all group shadow-xl"><i class="fas ${s.icon} text-3xl accent-text opacity-40 group-hover:opacity-100 mb-6 transition-all"></i><p class="text-xs font-bold uppercase tracking-widest">${s.name}</p></div>`).join('') || '<p class="opacity-10 text-[11px] uppercase tracking-[0.5em]">Offline</p>';
        }

        function renderExperience() {
            document.getElementById('path-timeline').innerHTML = state.experience.map((e, i) => `<div onclick="openModal('experience', ${i})" class="group flex gap-8 cursor-pointer hover:translate-x-3 transition-all"><div class="w-24 shrink-0 text-[11px] font-bold accent-text pt-1 mono uppercase tracking-tighter">${e.time || '20XX'}</div><div class="pb-12 border-l-2 border-white/10 pl-8 relative"><div class="absolute -left-[11px] top-1.5 w-5 h-5 rounded-full bg-white group-hover:bg-accent group-hover:scale-125 transition-all"></div><h4 class="text-2xl lg:text-3xl font-bold tracking-tight mb-3 uppercase">${e.role || 'ROLE'}</h4><p class="text-sm opacity-40 mb-6 font-medium">${e.company || 'COMPANY'}</p><p class="text-[11px] opacity-60 italic leading-relaxed">${e.desc || '...'}</p></div></div>`).join('') || '<p class="opacity-10 py-10 uppercase tracking-[0.5em]">Empty Log</p>';
        }

        function renderAssets() {
            document.getElementById('asset-grid').innerHTML = state.assets.map((a, i) => `<div onclick="openModal('assets', ${i})" class="bg-white/5 border border-white/10 p-8 rounded-[40px] hover:border-accent transition-all cursor-pointer shadow-2xl"><i class="fas fa-file-code text-3xl opacity-20 accent-text mb-10"></i><h4 class="text-xl font-bold mb-3 uppercase tracking-tight">${a.name || 'ASSET'}</h4><p class="text-[13px] opacity-40 mb-8 leading-relaxed font-light">${a.desc || '...'}</p><div class="flex items-center gap-3 text-[11px] font-bold accent-text uppercase tracking-widest"><i class="fas fa-check-circle"></i> VERIFIED_NODE</div></div>`).join('') || '<p class="opacity-10 py-10 col-span-full text-center tracking-[0.5em]">Assets Empty</p>';
        }

        function renderOutro() {
            document.getElementById('milestone-container').innerHTML = state.milestones.map((m, i) => `<div onclick="openModal('milestones', ${i})" class="flex items-center gap-3 text-xs font-bold uppercase tracking-widest text-yellow-500 cursor-pointer hover:scale-110 transition-all"><i class="fas fa-award"></i> ${m.text}</div>`).join('') || '<span class="opacity-10 text-[11px]">N/A</span>';
            document.getElementById('portfolio-list').innerHTML = state.portfolio.map((p, i) => `<div onclick="openModal('portfolio', ${i})" class="bg-white/5 border border-white/10 rounded-2xl aspect-square flex flex-col justify-center items-center text-center p-4 hover:border-accent transition-all cursor-pointer"><div><i class="fas fa-layer-group text-lg opacity-30 group-hover:text-blue-400"></i></div><h4 class="text-[10px] font-bold uppercase mt-4 tracking-widest">${p.title}</h4></div>`).join('');
            document.getElementById('links-container').innerHTML = state.socials.map((s, i) => `<div onclick="openModal('socials', ${i})" class="p-5 bg-white/5 rounded-2xl border border-white/5 cursor-pointer hover:border-purple-400 transition-all flex items-center gap-6"><i class="${s.icon} text-lg opacity-30 group-hover:text-purple-400"></i><span class="text-sm font-bold uppercase tracking-widest">${s.label}</span></div>`).join('');
        }

        const SCHEMAS = { skills: ['name', 'icon'], experience: ['company', 'role', 'time', 'desc'], assets: ['name', 'desc', 'url'], milestones: ['text'], portfolio: ['title', 'url'], socials: ['label', 'icon', 'url'] };
        function openModal(type, idx) {
            if (state.mode === 'preview' && (type === 'assets' || type === 'portfolio' || type === 'socials')) {
                if (state[type][idx].url && state[type][idx].url !== '#') window.open(state[type][idx].url, '_blank');
                return;
            }
            activeType = type; activeIdx = idx;
            document.getElementById('modal-fields').innerHTML = SCHEMAS[type].map(key => `<div><label class="text-[10px] font-bold uppercase opacity-30 mb-3 block tracking-widest">${key}</label><input type="text" id="inp-${key}" value="${state[type][idx][key] || ''}" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm text-white outline-none focus:border-accent"></div>`).join('');
            document.getElementById('modal-overlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modal-overlay').style.opacity = '1', 10);
        }
        function closeModal() { document.getElementById('modal-overlay').style.opacity = '0'; setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 300); }
        function saveModalData() { SCHEMAS[activeType].forEach(key => { state[activeType][activeIdx][key] = document.getElementById(`inp-${key}`).value; }); refreshUI(); closeModal(); saveState(); }
        function deleteItem() { state[activeType].splice(activeIdx, 1); refreshUI(); closeModal(); saveState(); }

        function addSkill() { state.skills.push({ name: 'Node', icon: 'fa-microchip' }); refreshUI(); openModal('skills', state.skills.length - 1); }
        function addExperience() { state.experience.push({ company: '', role: '', time: '', desc: '' }); refreshUI(); openModal('experience', state.experience.length - 1); }
        function addAsset() { state.assets.push({ name: '', desc: '', url: '#' }); refreshUI(); openModal('assets', state.assets.length - 1); }
        function addMilestone() { state.milestones.push({ text: 'Milestone' }); refreshUI(); openModal('milestones', state.milestones.length - 1); }
        function addPortfolio() { state.portfolio.push({ title: 'Work', url: '#' }); refreshUI(); openModal('portfolio', state.portfolio.length - 1); }
        function addSocial() { state.socials.push({ label: 'Social', icon: 'fab fa-github', url: '#' }); refreshUI(); openModal('socials', state.socials.length - 1); }

        function handleImage(e) { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onload = (ev) => { state.user.avatar = ev.target.result; refreshUI(); saveState(); }; reader.readAsDataURL(file); } }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('visible'); setTimeout(() => t.classList.remove('visible'), 2500); }
        function saveState() { 
            state.user.name = document.getElementById('user-name').innerText; state.user.role = document.getElementById('user-role').innerText; state.user.about = document.getElementById('user-about').innerText; state.user.status = document.getElementById('user-status').innerText; state.user.loc = document.getElementById('user-loc').innerText; state.user.lang = document.getElementById('user-lang').innerText; 
            localStorage.setItem('skillport_v28_labels', JSON.stringify(state)); 
        }
        function loadState() { const raw = localStorage.getItem('skillport_v28_labels'); if(raw) { Object.assign(state, JSON.parse(raw)); applyFullTheme(); setMode(state.mode); } }
        function syncLocal() { saveState(); showToast('Synchronized'); if(document.getElementById('action-popup')) document.getElementById('action-popup').classList.remove('active'); }
        
        async function exportDossier() { 
            showToast('Compiling Multi-Page Dossier...'); 
            document.body.classList.add('pdf-export-mode');
            const pdf = new jspdf.jsPDF('l', 'mm', 'a4');
            const pageIds = ['page-profile', 'page-ecosystem', 'page-path', 'page-proof', 'page-outro'];
            
            for (let i = 0; i < pageIds.length; i++) {
                showPage(pageIds[i].split('-')[1]);
                await new Promise(r => setTimeout(r, 600)); 
                const canvas = await html2canvas(document.getElementById(pageIds[i]), { 
                    backgroundColor: getComputedStyle(document.body).backgroundColor,
                    scale: 2,
                    useCORS: true
                });
                if (i > 0) pdf.addPage('l', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 297, 210);
            }
            
            pdf.save(`SkillPort_Dossier_${state.user.name.replace(/\s/g, '_')}.pdf`);
            document.body.classList.remove('pdf-export-mode');
            showPage('profile');
            showToast('Dossier Exported');
        }

        function showQR() { const div = document.createElement('div'); div.className = 'fixed inset-0 z-[10000] bg-black/95 flex items-center justify-center p-8 cursor-pointer'; div.onclick = () => div.remove(); const canvas = document.createElement('canvas'); div.appendChild(canvas); document.body.appendChild(div); QRCode.toCanvas(canvas, window.location.href, { width: 280, margin: 1 }); if(document.getElementById('action-popup')) document.getElementById('action-popup').classList.remove('active'); }
        function closeIdentity() { document.getElementById('main-frame').classList.add('closed'); if(document.getElementById('action-popup')) document.getElementById('action-popup').classList.remove('active'); }
        function reopenIdentity() { document.getElementById('main-frame').classList.remove('closed'); }
    </script>
</body>
</html>
